# ==============================================================================
# Description: Docker Compose configuration for the DNS Sinkhole service.
# Version: 1.2.0
# Author: Alhasan Al-Hmondi
# ==============================================================================

version: '3.8'

services:
  dns_sinkhole:
    build: .
    container_name: python_dns_sinkhole
    restart: unless-stopped
    ports:
      - "53:53/udp"
    
    # Dynamically inject environment variables from the .env file.
    # If the .env file or a specific variable is missing, Docker will 
    # automatically fall back to the default values provided after the ':-'
    environment:
      - UPSTREAM_DNS=${UPSTREAM_DNS:-8.8.8.8}
      - UPSTREAM_PORT=${UPSTREAM_PORT:-53}
      - CACHE_TTL=${CACHE_TTL:-300}